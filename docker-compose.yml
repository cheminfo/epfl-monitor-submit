version: '2.2'
services:
  server:
    build: .
    restart: always
    ulimits:
      core: 0
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
    environment:
      - DATA_PATH=/data/
    volumes:
      - ./sqlite:/node/sqlite
      - ./data:/data
    ports:
      - 127.0.0.1:50107:50107

  sync:
    build: .
    restart: always
    environment:
      - DATA_PATH=/data/
    volumes:
      - ./sqlite:/node/sqlite
      - ./data:/data
    command: npm run sync
